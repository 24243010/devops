<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Landing Page</title>

<style>

/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#081229;
}

/* Animated Gradient Background */
.bg-animation{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(
        -45deg,
        #00c6ff,
        #0072ff,
        #6a11cb,
        #f9d423
    );
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

/* Center Container */
.container{
    position:relative;
    z-index:10;
}

/* Glass Card */
.card{
    width:400px;
    padding:40px;
    text-align:center;
    color:white;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;

    box-shadow:0 8px 32px rgba(0,0,0,0.3);

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

.card h1{
    font-size:3rem;
    margin-bottom:15px;
}

.card p{
    font-size:1rem;
    margin-bottom:25px;
    opacity:0.9;
}

/* Button */
button{
    padding:14px 35px;
    border:none;
    border-radius:50px;
    font-size:1rem;
    font-weight:600;
    color:white;
    cursor:pointer;

    background:linear-gradient(
        90deg,
        #00c6ff,
        #6a11cb,
        #f9d423
    );

    background-size:300% 300%;
    animation:buttonGlow 4s linear infinite;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,255,255,0.6);
}

@keyframes buttonGlow{
    0%{
        background-position:0% 50%;
    }
    100%{
        background-position:100% 50%;
    }
}

/* Decorative Circles */
body::before,
body::after{
    content:'';
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
}

body::before{
    width:300px;
    height:300px;
    background:#6a11cb;
    top:-100px;
    left:-100px;
}

body::after{
    width:300px;
    height:300px;
    background:#00c6ff;
    bottom:-100px;
    right:-100px;
}

/* Responsive */
@media(max-width:500px){
    .card{
        width:90%;
        padding:30px;
    }

    .card h1{
        font-size:2rem;
    }
}

</style>
</head>

<body>

<div class="bg-animation"></div>

<div class="container">
    <div class="card">
        <h1>Welcome to github </h1>
        <p>Create stunning websites with modern CSS animations.</p>
        <button>Get Started</button>
    </div>
</div>

</body>
</html>
